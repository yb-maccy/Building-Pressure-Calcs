<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrostatic Building Pressure Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            display: flex;
            gap: 20px;
            height: 92vh;
        }
        #control-panel {
            width: 380px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        #visualizer {
            flex-grow: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }
        .height-inputs {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        input, select, button {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        input[type="number"] {
            width: 70px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 10px;
        }
        button:hover { background-color: #2471a3; }
        .btn-danger {
            background-color: #e74c3c;
        }
        .btn-danger:hover { background-color: #c0392b; }
        
        /* Blueprint Graphic Engine Layout */
        .floor-box {
            width: 360px;
            padding: 15px;
            margin: 8px 0;
            border-radius: 6px;
            border: 2px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .floor-actions {
            position: absolute;
            top: -12px;
            left: 10px;
            display: flex;
            gap: 5px;
        }
        .mini-btn {
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 3px;
        }
        .safe { background-color: #d4edda; border-color: #28a745; color: #155724; }
        .low { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .high { background-color: #fff3cd; border-color: #ffc107; color: #856404; }
        .riser {
            width: 4px;
            height: 16px;
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>System Config</h2>
        <div class="form-group">
            <label>Supply PSI:</label>
            <input type="number" id="incoming-psi" value="65" oninput="simulate()">
        </div>
        <hr style="width:100%">
        
        <h3>Add / Modify Floor</h3>
        <div class="form-group">
            <label>Floor Number:</label>
            <input type="number" id="floor-num" value="1">
        </div>
        <div class="form-group">
            <label>Custom Name (Optional):</label>
            <input type="text" id="floor-name" placeholder="e.g., Penthouse, Lobby" style="width: 150px;">
        </div>
        <div class="form-group">
            <label>Floor Height:</label>
