<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrostatic Building Pressure Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            display: flex;
            gap: 20px;
            height: 90vh;
        }
        #control-panel {
            width: 350px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #visualizer {
            flex-grow: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input, select, button {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 10px;
        }
        button:hover { background-color: #2471a3; }
        .floor-box {
            width: 320px;
            padding: 15px;
            margin: 8px 0;
            border-radius: 6px;
            border: 2px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .safe { background-color: #d4edda; border-color: #28a745; color: #155724; }
        .low { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .high { background-color: #fff3cd; border-color: #ffc107; color: #856404; }
        .riser {
            width: 4px;
            height: 16px;
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>System Config</h2>
        <div class="form-group">
            <label>Supply PSI:</label>
            <input type="number" id="incoming-psi" value="65" style="width: 80px;" oninput="simulate()">
        </div>
        <hr style="width:100%">
        <h3>Add/Edit Floor</h3>
        <div class="form-group"><label>Floor #:</label><input type="number" id="floor-num" value="1" style="width: 80px;"></div>
        <div class="form-group"><label>Height (ft):</label><input type="number" id="floor-h" value="12" style="width: 80px;"></div>
        <div class="form-group"><label>Pump Boost:</label><input type="number" id="floor-pump" value="0" style="width: 80px;"></div>
        <div class="form-group"><label>PRV Limit:</label><input type="number" id="floor-prv" placeholder="None" style="width: 80px;"></div>
        <button onclick="addFloor()">Add / Update Floor</button>
    </div>

    <div id="visualizer">
        <h2>Building Schematic</h2>
        <div id="blueprint" style="display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <script>
        const PSI_PER_FOOT = 0.4334;
        let floors = [
            {num: 3, height: 10, pump: 25, prv: null},
            {num: 2, height: 10, pump: 0, prv: null},
            {num: 1, height: 12, pump: 0, prv: null},
            {num: -1, height: 12, pump: 0, prv: null},
            {num: -2, height: 10, pump: 0, prv: 70}
        ];

        function addFloor() {
            let num = parseInt(document.getElementById('floor-num').value);
            let height = parseFloat(document.getElementById('floor-h').value);
            let pump = parseFloat(document.getElementById('floor-pump').value || 0);
            let prvVal = document.getElementById('floor-prv').value;
            let prv = prvVal !== "" ? parseFloat(prvVal) : null;

            if(num === 0) return alert("Floor 0 represents street grade.");

            let existing = floors.find(f => f.num === num);
            if(existing) {
                Object.assign(existing, {height, pump, prv});
            } else {
                floors.push({num, height, pump, prv});
            }
            simulate();
        }

        function simulate() {
            let baseP = parseFloat(document.getElementById('incoming-psi').value || 0);
            
            // Mathematics Engine
            let above = floors.filter(f => f.num > 0).sort((a,b) => a.num - b.num);
            let currentP = baseP;
            above.forEach(f => {
                currentP -= (f.height * PSI_PER_FOOT);
                if(f.pump > 0) currentP += f.pump;
                if(f.prv !== null && currentP > f.prv) currentP = f.prv;
                f.calcP = currentP;
            });

            let below = floors.filter(f => f.num < 0).sort((a,b) => b.num - a.num);
            currentP = baseP;
            below.forEach(f => {
                currentP += (f.height * PSI_PER_FOOT);
                if(f.pump > 0) currentP += f.pump;
                if(f.prv !== null && currentP > f.prv) currentP = f.prv;
                f.calcP = currentP;
            });

            renderBlueprint();
        }

        function renderBlueprint() {
            let blueprint = document.getElementById('blueprint');
            blueprint.innerHTML = "";
            let ordered = floors.sort((a,b) => b.num - a.num);

            ordered.forEach((f, index) => {
                let statusClass = "safe";
                if(f.calcP < 20) statusClass = "low";
                if(f.calcP > 80) statusClass = "high";

                let flrDiv = document.createElement('div');
                flrDiv.className = `floor-box ${statusClass}`;
                
                let title = f.num > 0 ? `FLOOR ${f.num}` : `BASEMENT ${Math.abs(f.num)}`;
                let equip = [];
                if(f.pump > 0) equip.push(`Pump +${f.pump}`);
                if(f.prv) equip.push(`PRV ${f.prv}`);
                let eqString = equip.length ? equip.join(" | ") : "Direct";

                flrDiv.innerHTML = `
                    <div><strong>${title}</strong><br><small>${f.height} ft</small></div>
                    <div style="text-align: right;"><strong>${f.calcP.toFixed(2)} PSI</strong><br><small>${eqString}</small></div>
                `;
                blueprint.appendChild(flrDiv);

                if(index !== ordered.length - 1) {
                    let riser = document.createElement('div');
                    riser.className = "riser";
                    blueprint.appendChild(riser);
                }
            });
        }
        simulate();
    </script>
</body>
</html>
